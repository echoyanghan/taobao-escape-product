<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>逃宝 - 今晚先逃，明早再买</title>
    <link rel="stylesheet" href="styles.css?v=20260722b" />
  </head>
  <body>
    <main class="phone-shell" aria-label="逃宝原型">
      <section class="screen">
        <div id="app"></div>
      </section>
    </main>

    <div class="modal" id="importModal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-head">
          <div>
            <p class="mini">手动输入</p>
            <h2 id="modalTitle">添加一件商品</h2>
          </div>
          <button class="icon-btn" id="closeModal" type="button" aria-label="关闭">×</button>
        </div>
        <label class="field">
          <span>平台</span>
          <input id="draftPlatform" type="text" />
        </label>
        <label class="field">
          <span>商品名</span>
          <input id="draftTitle" type="text" />
        </label>
        <label class="field">
          <span>金额</span>
          <input id="draftPrice" inputmode="decimal" type="number" min="1" />
        </label>
        <p class="hint">填写商品和价格，加入逃宝购物车。</p>
        <button class="primary full" id="confirmImport" type="button">加入购物车</button>
      </div>
    </div>

    <script src="runtime-config.js?v=20260722b"></script>
    <script src="data/catalog.js?v=20260720b"></script>
    <script src="app.js?v=20260722b"></script>
  </body>
</html>
